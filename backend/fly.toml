# Fly.io configuration — Field Sales CRM backend
# Docs: https://fly.io/docs/reference/configuration/

app = "field-sales-crm"
primary_region = "ewr"   # Newark, NJ — closest to New York

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep alive 24/7
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume — stores SQLite DB + audio files
# Create with: fly volumes create crm_data --region ewr --size 5
[mounts]
  source = "crm_data"
  destination = "/data"
